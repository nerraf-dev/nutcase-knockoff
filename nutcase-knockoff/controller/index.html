<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nutcase Controller</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="app">
		<header class="panel">
			<h1>Nutcase Controller</h1>
			<p class="muted">Connect your phone to the host game.</p>
		</header>

		<section class="panel">
			<label for="hostInput">Host (ws://ip:port)</label>
			<input id="hostInput" type="text" placeholder="ws://192.168.1.20:9080">

			<div class="row">
				<button id="connectBtn" type="button">Connect</button>
				<button id="disconnectBtn" type="button" class="secondary">Disconnect</button>
			</div>

			<p id="statusText" class="status">Status: Disconnected</p>
			<p id="turnText" class="status">Turn: Waiting for game</p>
		</section>

		<section class="panel">
			<label for="nameInput">Name</label>
			<input id="nameInput" type="text" maxlength="16" placeholder="Player name">

			<label for="avatarInput">Avatar Index</label>
			<input id="avatarInput" type="number" min="0" max="20" step="1" value="0">

			<div class="row">
				<button id="joinBtn" type="button">Join Lobby</button>
				<button id="readyBtn" type="button" class="secondary">Ready</button>
			</div>
		</section>

		<section class="panel">
			<h2>Debug Actions</h2>
			<p class="muted">Useful while wiring gameplay input.</p>

			<button id="continueBtn" type="button">Continue</button>

			<div id="votePanel" class="vote-panel" aria-live="polite">
				<p class="muted">Vote (fuzzy answers)</p>
				<p id="votePrompt" class="vote-prompt">No vote in progress.</p>
				<div class="row">
					<button id="voteAcceptBtn" type="button">Accept</button>
					<button id="voteRejectBtn" type="button" class="secondary">Reject</button>
				</div>
				<p id="voteResultText" class="muted"></p>
			</div>

			<p class="muted">Tap a tile to send a slider click. Buttons are 1-9; game receives 0-8.</p>
			<div id="sliderGrid" class="slider-grid">
				<button type="button" class="slider-tile secondary" data-index="0">1</button>
				<button type="button" class="slider-tile secondary" data-index="1">2</button>
				<button type="button" class="slider-tile secondary" data-index="2">3</button>
				<button type="button" class="slider-tile secondary" data-index="3">4</button>
				<button type="button" class="slider-tile secondary" data-index="4">5</button>
				<button type="button" class="slider-tile secondary" data-index="5">6</button>
				<button type="button" class="slider-tile secondary" data-index="6">7</button>
				<button type="button" class="slider-tile secondary" data-index="7">8</button>
				<button type="button" class="slider-tile secondary" data-index="8">9</button>
			</div>

			<label for="guessInput">Guess</label>
			<input id="guessInput" type="text" placeholder="Type a guess">
			<button id="guessBtn" type="button" class="secondary">Send Guess</button>
		</section>

		<section class="panel">
			<h2>Log</h2>
			<pre id="logBox" class="log" aria-live="polite"></pre>
		</section>
	</main>

	<script src="app.js"></script>
</body>
</html>
